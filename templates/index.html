<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR-HUB · Welcome</title>

    <!-- Font Awesome — integrity hash removed (hash mismatch = icons load as squares) -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Quicksand:wght@400;600;700&display=swap"
          rel="stylesheet">

    <!-- Your stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <style>
    /* ── Hard fix: FA icons showing as □ ──────────────────────────────────
       Root cause: Quicksand (loaded above) has no glyphs for FA codepoints.
       The *:not(i) reset in login.css v3 wipes font-family on ALL elements
       including <i> tags — this override restores it at highest specificity.
    ─────────────────────────────────────────────────────────────────────── */
    i.fa, i.fas, i.far, i.fab, i.fal, i.fad,
    i[class*="fa-"],
    span[class*="fa-"] {
        font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
        font-style:   normal        !important;
        font-variant: normal        !important;
        line-height:  1             !important;
        display:      inline-block  !important;
        -webkit-font-smoothing:  antialiased !important;
        -moz-osx-font-smoothing: grayscale   !important;
    }
    i.fas  { font-weight: 900 !important; }
    i.far  { font-weight: 400 !important; }
    i.fab  { font-family: "Font Awesome 6 Brands" !important; font-weight: 400 !important; }

    /* ── Accessibility ── */
    .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0;
        margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
        white-space: nowrap; border: 0;
    }

    /* ── Sakura petals ── */
    .sakura-petal {
        position: fixed; top: -10%; z-index: 0; pointer-events: none;
        opacity: .7; animation: fall3D linear forwards;
        transform-style: preserve-3d; backface-visibility: hidden;
        filter: drop-shadow(0 0 4px rgba(255,126,179,.55));
        will-change: transform, opacity;
    }
    @keyframes fall3D {
        0%   { transform: translateY(0)     rotate(0deg)   translateZ(0);    opacity: .85; }
        30%  { transform: translateY(30vh)  rotate(180deg) translateZ(40px); opacity: .75; }
        60%  { transform: translateY(60vh)  rotate(360deg) translateZ(80px); opacity: .50; }
        100% { transform: translateY(110vh) rotate(720deg) translateZ(160px);opacity: 0;   }
    }
    .sakura-petal.linger { animation: lingerEffect 1.5s ease-out forwards; }
    @keyframes lingerEffect {
        0%   { transform: scale(1) rotate(0deg);   opacity: 1;  filter: drop-shadow(0 0 10px gold);    }
        50%  { transform: scale(2) rotate(180deg); opacity: .8; filter: drop-shadow(0 0 28px hotpink); }
        100% { transform: scale(0) rotate(360deg); opacity: 0;                                          }
    }

    /* ── Feature pills ── */
    .feature-pills {
        position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 10px; z-index: 20;
        flex-wrap: wrap; justify-content: center;
        pointer-events: none;
    }
    .pill {
        padding: 6px 18px; border-radius: 30px;
        background: rgba(255,255,255,.08);
        -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,.14);
        color: rgba(255,255,255,.65); font-size: 12px; font-weight: 600;
        display: inline-flex; align-items: center; gap: 7px;
        animation: pillIn .8s ease both;
    }
    .pill:nth-child(1) { animation-delay: .10s; }
    .pill:nth-child(2) { animation-delay: .20s; }
    .pill:nth-child(3) { animation-delay: .30s; }
    .pill:nth-child(4) { animation-delay: .40s; }
    @keyframes pillIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .pill i { color: #ff7eb3; font-size: 11px; }

    @media (max-width: 480px) {
        .feature-pills { gap: 6px; bottom: 16px; }
        .pill { font-size: 11px; padding: 5px 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
        .sakura-petal { display: none; }
        .feature-pills .pill { animation: none; opacity: 1; transform: none; }
    }
    </style>
</head>
<body>

<!-- ── Brand logo ── -->
<a href="/" class="brand-logo" aria-label="SKR-HUB home">SKR‑HUB</a>

<!-- ── Welcome badge ── -->
<p class="center-title" aria-hidden="true">✦ WELCOME BACK ✦</p>

<!-- ══════════════════════════════════════
     MAIN CONTAINER  (IDs must match login.js)
══════════════════════════════════════════ -->
<div class="container" id="mainContainer">

    <!-- SIGN IN -->
    <div class="form-container sign-in">
        <form id="loginForm" novalidate aria-label="Sign in">
            <h2>Sign In</h2>

            <div class="input-group">
                <label for="loginEmail" class="sr-only">Email address</label>
                <input type="email" id="loginEmail" name="email"
                       placeholder="Email address"
                       autocomplete="email" required>
                <i class="fas fa-envelope field-icon" aria-hidden="true"></i>
            </div>

            <div class="input-group">
                <label for="loginPassword" class="sr-only">Password</label>
                <input type="password" id="loginPassword" name="password"
                       placeholder="Password"
                       autocomplete="current-password" required>
                <i class="fas fa-lock field-icon" aria-hidden="true"></i>
            </div>

            <button type="submit" class="action-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Sign In
            </button>

            <a href="/forgot-password" class="forgot-password">
                <i class="fas fa-key" aria-hidden="true"></i> Forgot password?
            </a>
        </form>
    </div>

    <!-- SIGN UP -->
    <div class="form-container sign-up">
        <form id="regForm" novalidate aria-label="Create account">
            <h2>Create Account</h2>

            <div class="input-group">
                <label for="regUsername" class="sr-only">Username</label>
                <input type="text" id="regUsername" name="username"
                       placeholder="Username (min 3 chars)"
                       autocomplete="username" required>
                <i class="fas fa-user field-icon" aria-hidden="true"></i>
            </div>

            <div class="input-group">
                <label for="regEmail" class="sr-only">Email address</label>
                <input type="email" id="regEmail" name="email"
                       placeholder="Email address"
                       autocomplete="email" required>
                <i class="fas fa-envelope field-icon" aria-hidden="true"></i>
            </div>

            <div class="input-group">
                <label for="regPassword" class="sr-only">Password</label>
                <input type="password" id="regPassword" name="password"
                       placeholder="Password (min 6 chars)"
                       autocomplete="new-password" required>
                <i class="fas fa-lock field-icon" aria-hidden="true"></i>
            </div>

            <!-- Strength bar — login.css v3 reads [data-level] -->
            <div class="pw-strength" id="regPwStrength" aria-hidden="true">
                <span></span><span></span><span></span>
            </div>

            <button type="submit" class="action-btn" id="signupBtn">
                <i class="fas fa-user-plus" aria-hidden="true"></i> Sign Up
            </button>
        </form>
    </div>

    <!-- OVERLAY -->
    <div class="overlay-container" aria-hidden="true">
        <div class="overlay">

            <div class="overlay-panel overlay-left">
                <h2>Hello, Friend!</h2>
                <p>Already have an account?<br>Sign in and keep your streak alive 🌸</p>
                <button class="ghost" id="signInBtn" type="button">
                    <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Sign In
                </button>
            </div>

            <div class="overlay-panel overlay-right">
                <h2>Welcome Back!</h2>
                <p>New here? Join SKR‑HUB and start mastering your goals today ✨</p>
                <button class="ghost" id="signUpBtn" type="button">
                    <i class="fas fa-user-plus" aria-hidden="true"></i> Sign Up
                </button>
            </div>

        </div>
    </div>

</div><!-- /#mainContainer -->

<!-- FOOTER -->
<footer class="footer">
    © 2026 SKR‑HUB · Created by <strong>Nguyễn Doãn Hoàng</strong>
</footer>

<!-- TOAST -->
<div class="toast" id="toastMsg" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- Sakura spawner -->
<script>
(function () {
    const ICONS = ['🌸','💮','✨','🌸','🌸'];
    const MAX   = 18;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    setInterval(() => {
        if (document.visibilityState !== 'visible') return;
        if (document.querySelectorAll('.sakura-petal').length >= MAX) return;
        const p   = document.createElement('div');
        p.className   = 'sakura-petal';
        p.textContent = ICONS[Math.random() * ICONS.length | 0];
        const dur   = (Math.random() * 6 + 7).toFixed(1);
        const delay = (Math.random() * 2).toFixed(1);
        p.style.cssText = `left:${(Math.random()*100).toFixed(1)}vw;font-size:${(Math.random()*16+13)|0}px;animation-duration:${dur}s;animation-delay:${delay}s`;
        document.body.appendChild(p);
        p.addEventListener('mouseenter', () => {
            p.classList.add('linger');
            setTimeout(() => p.remove(), 1100);
        }, { once: true });
        setTimeout(() => { if (p.isConnected) p.remove(); }, (+dur + +delay + .5) * 1000);
    }, 400);
})();
</script>

<!-- Your existing JS -->
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
