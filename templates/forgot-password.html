<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR-HUB · Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sakura-pink: #ff7eb3;
            --sakura-glow: #ff2d78;
            --cyber-blue: #00eaff;
            --bg-dark: #0f0c29;
            --glass-bg: rgba(255, 126, 179, 0.12);
            --glass-border: rgba(255, 255, 255, 0.18);
            --neon-shadow: 0 0 20px rgba(255, 126, 179, 0.5);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Quicksand', sans-serif; }
        body {
            min-height:100vh;
            background: radial-gradient(circle at center, #2d1b4e 0%, #0f0c29 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        .glass-card {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 40px;
    padding: 40px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    animation: fadeIn 0.8s ease;
}
        @keyframes fadeIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        h1 {
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    margin-bottom: 30px;

    background: linear-gradient(90deg, #fff, var(--sakura-pink), var(--cyber-blue));
    background-size: 200% auto;

    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;

    animation: shine 6s linear infinite;
}
        @keyframes shine { to { background-position: 200% center; } }
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }
        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--sakura-pink);
            font-size: 1.2rem;
            transition: 0.3s;
            z-index: 2;
        }
        .candy-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid transparent;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.4s;
        }
        .candy-input:focus {
            border-color: var(--sakura-pink);
            box-shadow: var(--neon-shadow);
            background: rgba(255,126,179,0.15);
        }
        .candy-input::placeholder { color: rgba(255,255,255,0.6); }
        .candy-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-glow));
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255,126,179,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .candy-btn:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(255,126,179,0.5);
        }
        .candy-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: 0.3s;
        }
        .back-link:hover { color: white; transform: translateX(-5px); }
        .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(30px);

    background: rgba(255,255,255,0.95);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);

    color: #1a1a2e;
    padding: 14px 30px;
    border-radius: 60px;

    box-shadow: 0 20px 40px rgba(0,0,0,0.3), var(--neon-shadow);

    display: flex;
    align-items: center;
    gap: 10px;

    opacity: 0;
    visibility: hidden;
    transition: 0.4s;
    z-index: 10000;
}
        .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #ff4d4d; color: white; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1><i class="fas fa-lock"></i> Forgot Password</h1>
        <form id="forgotForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="candy-input" placeholder="Your email address" required>
            </div>
            <button type="submit" class="candy-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
    <div id="toast" class="toast"><i class="fas fa-info-circle"></i> <span></span></div>

    <script>
        const form = document.getElementById('forgotForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        function showToast(msg, isError = false) {
            toast.querySelector('span').textContent = msg;
            toast.classList.add('show');
            toast.className = 'toast' + (isError ? ' error' : '');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (!email) {
                showToast('Please enter your email', true);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const res = await fetch('/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ email })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    showToast('Redirecting to reset page...');
                    // Chuyển hướng đến trang reset password
                    window.location.href = data.reset_link;
                } else {
                    showToast(data.message || 'Email not found', true);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
                }
            } catch (err) {
                showToast('Network error. Please try again.', true);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
            }
        });
    </script>
</body>
</html>
