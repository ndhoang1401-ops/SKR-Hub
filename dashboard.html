<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEMS Dashboard</title>

<style>
:root{
    --bg1:#ffe6f0;
    --bg2:#ffd6ec;
    --card:rgba(255,255,255,.75);
    --accent:#ff6fa5;
    --accent2:#ff9ec7;
    --text:#4b2e39;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    min-height:100vh;
    overflow-x:hidden;
    color:var(--text);
}

/* Sakura petals */

.petal{
    position:fixed;
    top:-20px;
    width:12px;
    height:12px;
    background:radial-gradient(circle at 30% 30%, #fff 0%, #ffc1dc 60%);
    border-radius:50% 50% 50% 0;
    transform:rotate(45deg);
    opacity:.7;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:.3;
    }
}

/* HEADER */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 24px;
    backdrop-filter:blur(10px);
}

.title{
    font-weight:600;
    font-size:18px;
    background:linear-gradient(90deg,#ff6fa5,#ff9ec7,#ffc1dc);
    background-size:200% auto;

    background-clip:text;              /* thêm dòng này */
    -webkit-background-clip:text;

    color:transparent;                 /* thay cho webkit-text-fill */
    -webkit-text-fill-color:transparent;

    animation:shine 4s linear infinite;
    
}

@keyframes shine{
    to{background-position:200% center;}
}

button{
    border:none;
    padding:10px 16px;
    border-radius:12px;
    cursor:pointer;
    font-size:14px;
    background:linear-gradient(45deg,var(--accent),var(--accent2));
    color:white;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 15px rgba(255,111,165,.4);
}

.grid{
    padding:20px;
    display:grid;
    gap:20px;
}

@media(min-width:768px){
    .grid{
        grid-template-columns:1fr 1fr;
        padding:40px;
    }
}

.card{
    background:var(--card);
    padding:24px;
    border-radius:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(255,111,165,.2);
    animation:fade .5s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;}
}

h3{
    margin-bottom:15px;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #ffc1dc;
    margin-top:8px;
}

.progress{
    width:140px;
    height:140px;
    margin:20px auto;
    border-radius:50%;
    background:conic-gradient(var(--accent) 0deg, #ffd6ec 0deg);
    display:flex;
    align-items:center;
    justify-content:center;
}

.timer{
    text-align:center;
    font-size:26px;
    margin-bottom:10px;
}

footer{
    text-align:center;
    padding:25px;
    font-size:13px;
    color:#a64d79;
}
</style>
</head>

<body>
   <header>
    <a href="https://self-learning-management.up.railway.app/" target="_blank">
        <img src="sakura.png" class="sakura-logo" alt="Sakura Logo">
    </a>

    <div class="title" id="welcome">CEMS Dashboard</div>

    <button onclick="logout()">Logout</button>
</header>

<div class="grid">

    <div class="card">
        <h3>Quick Access</h3>

        <div class="actions">
            <button onclick="openFlashcard()">Flashcard</button>
            <button onclick="openChatGPT()">ChatGPT</button>
        </div>

        <form onsubmit="searchGoogle(event)">
            <input id="googleSearch" type="text" placeholder="Search Google..." required>
            <button type="submit" style="width:100%;margin-top:10px;">
                Search
            </button>
        </form>
    </div>

    <div class="card">
        <h3>Pomodoro</h3>

        <input id="minutes" type="number" placeholder="Minutes">
        <input id="seconds" type="number" placeholder="Seconds">

        <div class="progress" id="circle">
            <div id="percent">0%</div>
        </div>

        <div class="timer" id="timer">00:00</div>

        <div class="actions">
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>

        <div id="notify" style="text-align:center;margin-top:10px;"></div>
    </div>

</div>

<footer>
    © Created by Nguyễn Doãn Hoàng
</footer>

<script>
"use strict";

/* Sakura generator */

for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    p.style.opacity=Math.random();
    document.body.appendChild(p);
}

/* Session */

function getSession(){
    const s=JSON.parse(localStorage.getItem("chemSession"));
    if(!s) return null;
    if(Date.now()>s.expires){
        localStorage.removeItem("chemSession");
        return null;
    }
    return s.user;
}

document.addEventListener("DOMContentLoaded",()=>{
    const user=getSession();
    if(!user){
        window.location.replace("index.html");
        return;
    }
    document.getElementById("welcome").innerText="Welcome, "+user.name;

    if("Notification" in window){
        Notification.requestPermission();
    }
});

/* Nav */

function logout(){
    localStorage.removeItem("chemSession");
    window.location.replace("index.html");
}

function openChatGPT(){
    window.open("https://chat.openai.com","_blank");
}

function openFlashcard(){
    window.location.href="flashcard.html";
}

function searchGoogle(e){
    e.preventDefault();
    const q=document.getElementById("googleSearch").value.trim();
    if(!q) return;
    window.open("https://www.google.com/search?q="+encodeURIComponent(q),"_blank");
}

/* Pomodoro */

let interval=null,total=0,remaining=0,running=false;
const circle=document.getElementById("circle");
const percent=document.getElementById("percent");
const timer=document.getElementById("timer");
const notify=document.getElementById("notify");

function update(){
    let m=Math.floor(remaining/60);
    let s=remaining%60;
    timer.innerText=
    String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

    let p=total?((total-remaining)/total)*100:0;

    circle.style.background=
    `conic-gradient(var(--accent) ${p*3.6}deg,#ffd6ec 0deg)`;

    percent.innerText=Math.floor(p)+"%";
}

function beep(){
    const audio=new Audio(
    "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
    audio.play();
}

function notifyUser(){
    if(Notification.permission==="granted"){
        new Notification("Pomodoro Completed");
    }
}

function startTimer(){
    if(running) return;

    if(total===0){
        const m=parseInt(minutes.value)||0;
        const s=parseInt(seconds.value)||0;
        total=m*60+s;
        remaining=total;
    }

    if(remaining<=0) return;

    running=true;

    interval=setInterval(()=>{
        remaining--;
        update();
        if(remaining<=0){
            clearInterval(interval);
            running=false;
            notify.innerText="Completed";
            beep();
            notifyUser();
        }
    },1000);

    update();
}

function pauseTimer(){
    clearInterval(interval);
    running=false;
}

function resetTimer(){
    clearInterval(interval);
    total=0;
    remaining=0;
    running=false;
    notify.innerText="";
    update();
}
</script>

</body>
</html>
