<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR-HUB · Forgot Password</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Quicksand:wght@400;600;700&display=swap"
          rel="stylesheet">

    <style>

/* ── TOKENS ── */
:root{
    --sakura-pink:  #ff7eb3;
    --sakura-glow:  #ff2d78;
    --cyber-blue:   #00eaff;
    --cyber-purple: #9d4edd;
    --glass-bg:     rgba(255,126,179,0.12);
    --glass-border: rgba(255,255,255,0.18);
    --text-primary: #ffffff;
    --text-muted:   rgba(255,255,255,0.65);
    --shadow-pink:  rgba(255,126,179,0.50);
    --color-error:  #ff4d4d;
    --color-success:#00c896;
    --ease-smooth:  cubic-bezier(0.175,0.885,0.32,1.275);
    --ease-bounce:  cubic-bezier(0.68,-0.55,0.27,1.55);
    --neon-shadow:  0 0 20px rgba(255,126,179,0.50),
                    0 0 40px rgba(0,234,255,0.25);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Quicksand',sans-serif;
    min-height:100vh;
    background:radial-gradient(circle at 30% 30%,#2d1b4e 0%,#0f0c29 80%,#1a1a2e 100%);
    display:flex;align-items:center;justify-content:center;
    padding:20px;position:relative;overflow:hidden;
    animation:pageIn 0.6s var(--ease-smooth) both;
}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* dot-grid */
body::before{
    content:'';position:fixed;inset:0;
    background-image:
        radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px),
        radial-gradient(circle,rgba(255,126,179,0.07) 1px,transparent 1px);
    background-size:60px 60px,90px 90px;
    background-position:0 0,30px 30px;
    pointer-events:none;z-index:0;
}

/* floating orbs */
.orb{
    position:fixed;border-radius:50%;pointer-events:none;z-index:0;
    animation:orbFloat 8s ease-in-out infinite alternate;
    filter:blur(60px);opacity:.30;
}
.orb-1{width:280px;height:280px;background:var(--sakura-pink);top:-80px;left:-80px;animation-delay:0s}
.orb-2{width:220px;height:220px;background:var(--cyber-purple);bottom:-60px;right:-60px;animation-delay:-3s}
.orb-3{width:160px;height:160px;background:var(--cyber-blue);top:55%;right:4%;animation-delay:-5s}
@keyframes orbFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(28px) scale(1.08)}}

/* ── CARD ── */
.glass-card{
    background:var(--glass-bg);
    -webkit-backdrop-filter:blur(25px);
    backdrop-filter:blur(25px);
    border:1px solid var(--glass-border);
    border-radius:40px;padding:44px 40px;
    width:100%;max-width:460px;
    box-shadow:0 30px 60px rgba(0,0,0,0.35),var(--neon-shadow);
    position:relative;z-index:10;
    animation:cardAppear 0.8s var(--ease-smooth) both;
    isolation:isolate;
}
@keyframes cardAppear{from{opacity:0;transform:scale(0.92) translateY(28px)}to{opacity:1;transform:scale(1) translateY(0)}}

.brand{
    text-align:center;font-family:'Orbitron',sans-serif;
    font-size:.8rem;letter-spacing:6px;color:var(--text-muted);
    margin-bottom:8px;text-transform:uppercase;
}

/* ── HEADING ── */
h1{
    font-family:'Orbitron',sans-serif;
    font-size:1.55rem;text-align:center;
    margin-bottom:10px;
    display:flex;align-items:center;justify-content:center;gap:12px;
    /* FIX: -webkit-background-clip TRƯỚC background-clip */
    background:linear-gradient(90deg,#fff,var(--sakura-pink),var(--cyber-blue));
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
    animation:shine 6s linear infinite;
}
h1 i{
    background:none;
    -webkit-text-fill-color:var(--sakura-pink);
    color:var(--sakura-pink);
    filter:drop-shadow(0 0 8px var(--sakura-pink));
    flex-shrink:0;
}
@keyframes shine{to{background-position:200% center}}

.subtitle{
    text-align:center;color:var(--text-muted);
    font-size:.9rem;margin-bottom:28px;line-height:1.6;
}

/* ── INPUT GROUP ── */
.input-group{position:relative;margin-bottom:6px}

.field-icon{
    position:absolute;left:20px;top:50%;transform:translateY(-50%);
    color:var(--sakura-pink);font-size:1.1rem;z-index:2;pointer-events:none;
    transition:color 0.3s ease,transform 0.3s ease;
    filter:drop-shadow(0 0 5px var(--sakura-pink));
}

.candy-input{
    width:100%;padding:16px 48px 16px 52px;
    border:2px solid transparent;border-radius:50px;
    background:rgba(255,255,255,0.10);
    -webkit-backdrop-filter:blur(5px);
    backdrop-filter:blur(5px);
    color:var(--text-primary);font-size:15px;outline:none;
    transition:border-color 0.35s ease,background 0.35s ease,
               box-shadow 0.35s ease,transform 0.35s var(--ease-smooth);
    will-change:transform;
}
.candy-input:focus{
    border-color:var(--sakura-pink);
    background:rgba(255,126,179,0.18);
    box-shadow:var(--neon-shadow);
    transform:scale(1.02);
}
.candy-input:focus ~ .field-icon{
    color:var(--cyber-blue);
    transform:translateY(-50%) scale(1.15);
}
.candy-input::placeholder{color:var(--text-muted)}
.candy-input:focus-visible{outline:3px solid var(--cyber-blue);outline-offset:2px}

/* validation */
.input-group.error .candy-input{
    border-color:var(--color-error);
    background:rgba(255,77,77,0.10);
}
.input-group.success .candy-input{
    border-color:var(--color-success);
    background:rgba(0,200,150,0.08);
}
.field-msg{
    font-size:12px;font-weight:500;
    margin:5px 0 12px 20px;
    opacity:0;transform:translateY(-4px);
    transition:opacity 0.3s ease,transform 0.3s ease;
}
.input-group.error   .field-msg{color:var(--color-error);  opacity:1;transform:translateY(0)}
.input-group.success .field-msg{color:var(--color-success);opacity:1;transform:translateY(0)}

/* ── BUTTON ── */
.candy-btn{
    width:100%;padding:16px;border:none;border-radius:50px;
    background:linear-gradient(135deg,var(--sakura-pink),var(--sakura-glow));
    color:#fff;font-weight:700;font-size:1rem;
    cursor:pointer;letter-spacing:.5px;
    transition:transform 0.4s var(--ease-bounce),box-shadow 0.4s ease;
    box-shadow:0 10px 25px var(--shadow-pink);
    display:flex;align-items:center;justify-content:center;gap:10px;
    position:relative;overflow:hidden;will-change:transform;
    margin-top:4px;
}
.candy-btn::before{
    content:'';position:absolute;inset:0;left:-100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28),transparent);
    transition:left 0.5s ease;
}
.candy-btn:hover:not(:disabled)::before{left:100%}
.candy-btn:hover:not(:disabled){
    transform:translateY(-5px) scale(1.02);
    box-shadow:0 20px 35px var(--shadow-pink);
}
.candy-btn:active:not(:disabled){transform:translateY(0) scale(0.98)}
.candy-btn:focus-visible{outline:3px solid var(--cyber-blue);outline-offset:3px}
.candy-btn:disabled{opacity:.65;cursor:not-allowed}

/* loading */
.candy-btn.loading{color:transparent;pointer-events:none}
.candy-btn.loading::after{
    content:'';position:absolute;
    width:22px;height:22px;top:50%;left:50%;margin:-11px 0 0 -11px;
    border:3px solid rgba(255,255,255,0.35);border-top-color:#fff;
    border-radius:50%;animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STEPS indicator ── */
.steps{
    display:flex;align-items:center;justify-content:center;
    gap:8px;margin-bottom:24px;
}
.step{
    display:flex;align-items:center;gap:6px;
    font-size:12px;font-weight:700;color:var(--text-muted);
}
.step-dot{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;
    border:2px solid rgba(255,255,255,0.20);
    background:rgba(255,255,255,0.06);
    transition:all 0.4s ease;
}
.step.active .step-dot{
    background:var(--sakura-pink);
    border-color:var(--sakura-pink);
    color:#fff;
    box-shadow:0 0 14px var(--shadow-pink);
}
.step.done .step-dot{
    background:var(--color-success);
    border-color:var(--color-success);
    color:#fff;
}
.step-line{width:40px;height:2px;background:rgba(255,255,255,0.12);border-radius:2px}
.step-line.done{background:var(--color-success)}

/* ── SUCCESS STATE ── */
.success-state{
    display:none;flex-direction:column;align-items:center;
    gap:14px;text-align:center;padding:12px 0;
}
.success-icon{
    width:72px;height:72px;border-radius:50%;
    background:rgba(0,200,150,0.18);
    border:2px solid var(--color-success);
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;color:var(--color-success);
    box-shadow:0 0 28px rgba(0,200,150,0.35);
    animation:popIn 0.5s var(--ease-bounce) both;
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-family:'Orbitron',sans-serif;color:var(--color-success);font-size:1rem}
.success-msg  {color:var(--text-muted);font-size:13px;line-height:1.6;max-width:300px}
.success-email{
    background:rgba(0,200,150,0.12);
    border:1px solid rgba(0,200,150,0.30);
    border-radius:30px;padding:8px 20px;
    font-size:13px;font-weight:700;color:var(--color-success);
    word-break:break-all;
}

/* ── DIVIDER & BACK LINK ── */
.divider{
    display:flex;align-items:center;gap:12px;
    margin:20px 0;color:var(--text-muted);font-size:13px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.12)}

.back-link{
    display:flex;align-items:center;justify-content:center;gap:8px;
    color:var(--text-muted);text-decoration:none;font-size:.9rem;
    transition:color 0.3s ease,transform 0.3s ease;font-weight:600;
}
.back-link:hover{color:var(--text-primary);transform:translateX(-4px)}
.back-link:focus-visible{outline:3px solid var(--cyber-blue);outline-offset:3px;border-radius:8px}

/* ── TOAST ── */
.toast{
    position:fixed;bottom:28px;left:50%;
    transform:translateX(-50%) translateY(28px);
    background:rgba(255,255,255,0.95);
    -webkit-backdrop-filter:blur(20px);
    backdrop-filter:blur(20px);
    color:#1a1a2e;padding:13px 28px;border-radius:60px;
    box-shadow:0 20px 40px rgba(0,0,0,0.28),var(--neon-shadow);
    display:flex;align-items:center;gap:10px;
    opacity:0;visibility:hidden;
    transition:opacity 0.4s ease,visibility 0.4s ease,
               transform 0.4s var(--ease-bounce);
    z-index:10000;font-weight:600;font-size:.95rem;
    will-change:transform,opacity;
}
.toast.show   {opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
/* FIX B2: set className FIRST then add show — prevent overwrite */
.toast.error  {background:linear-gradient(135deg,#ff4d4d,#f9cbca);color:#fff}
.toast.success{background:linear-gradient(135deg,#00b09b,#96c93d);color:#fff}
.toast.info   {background:linear-gradient(135deg,#56ccf2,#2f80ed);color:#fff}

@media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    .orb{display:none}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    
/* ═══ ICON FIX — must be LAST in <style> to override * {font-family} ═══ */
.fa,.fas,.far,.fab,.fal,.fad,i[class*="fa-"],[class^="fa-"],[class*=" fa-"]{
    font-family:"Font Awesome 6 Free","Font Awesome 6 Brands" !important;
    font-style:normal !important;font-variant:normal !important;
    line-height:1 !important;
    -webkit-font-smoothing:antialiased !important;
    -moz-osx-font-smoothing:grayscale !important;
}
.fas{font-weight:900 !important;}
.far{font-weight:400 !important;}
.fab{font-family:"Font Awesome 6 Brands" !important;font-weight:400 !important;}
</style>
</head>
<body>

<!-- Floating orbs -->
<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>
<div class="orb orb-3" aria-hidden="true"></div>

<div class="glass-card" role="main">
    <p class="brand">SKR‑HUB</p>

    <h1>
        <i class="fas fa-lock" aria-hidden="true"></i>
        Forgot Password
    </h1>

    <p class="subtitle">Enter your email and we'll send you a reset link instantly.</p>

    <!-- Steps indicator -->
    <div class="steps" aria-label="Reset steps">
        <div class="step active" id="step1">
            <div class="step-dot">1</div>
            <span>Email</span>
        </div>
        <div class="step-line" id="stepLine"></div>
        <div class="step" id="step2">
            <div class="step-dot">2</div>
            <span>Reset</span>
        </div>
    </div>

    <!-- FORM -->
    <form id="forgotForm" novalidate aria-label="Forgot password form">
        <div class="input-group" id="emailGroup">
            <label for="email" class="sr-only">Email address</label>
            <input type="email" id="email" class="candy-input"
                   placeholder="your@email.com"
                   autocomplete="email"
                   aria-label="Email address"
                   aria-describedby="emailMsg">
            <i class="fas fa-envelope field-icon" aria-hidden="true"></i>
        </div>
        <p class="field-msg" id="emailMsg" role="alert" aria-live="polite"></p>

        <button type="submit" class="candy-btn" id="submitBtn" aria-label="Send reset link">
            <i class="fas fa-paper-plane" aria-hidden="true"></i>
            Send Reset Link
        </button>
    </form>

    <!-- SUCCESS STATE -->
    <div class="success-state" id="successState" aria-live="polite">
        <div class="success-icon">
            <i class="fas fa-envelope-open-text" aria-hidden="true"></i>
        </div>
        <p class="success-title">Check Your Email!</p>
        <div class="success-email" id="successEmail">–</div>
        <p class="success-msg">
            Reset link sent! Check your inbox (and spam folder just in case). 📬
        </p>
    </div>

    <div class="divider">or</div>

    <a href="/" class="back-link" aria-label="Back to login page">
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
        Back to Login
    </a>
</div>

<!-- TOAST -->
<div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true">
    <i class="fas fa-info-circle" id="toastIcon" aria-hidden="true"></i>
    <span id="toastMsg"></span>
</div>

<script>
const form      = document.getElementById('forgotForm');
const emailEl   = document.getElementById('email');
const submitBtn = document.getElementById('submitBtn');
const emailGroup= document.getElementById('emailGroup');
const emailMsg  = document.getElementById('emailMsg');

/* ── TOAST — FIX B2: className set BEFORE add('show') ── */
let _tt = null;
function showToast(msg, type='info', dur=3200){
    const t   = document.getElementById('toast');
    const icons={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};
    t.className = `toast ${type}`;               // set type FIRST
    document.getElementById('toastIcon').className = `fas ${icons[type]||icons.info}`;
    document.getElementById('toastMsg').textContent = msg;
    void t.offsetHeight;                          // force reflow
    t.classList.add('show');                      // THEN add show
    clearTimeout(_tt);
    _tt = setTimeout(()=>t.classList.remove('show'), dur);
}

/* ── EMAIL VALIDATION ── */
function validateEmail(v){
    return /^\S+@\S+\.\S+$/.test(v);
}

emailEl.addEventListener('input', ()=>{
    const v = emailEl.value.trim();
    if(!v){ emailGroup.classList.remove('error','success'); emailMsg.textContent=''; return; }
    if(!validateEmail(v)){
        emailGroup.classList.add('error'); emailGroup.classList.remove('success');
        emailMsg.textContent = 'Địa chỉ email không hợp lệ';
    } else {
        emailGroup.classList.add('success'); emailGroup.classList.remove('error');
        emailMsg.textContent = '✓ Looks good!';
    }
});

/* ── STEPS animation ── */
function setStep2Done(){
    const s1 = document.getElementById('step1');
    const s2 = document.getElementById('step2');
    const line = document.getElementById('stepLine');
    s1.classList.remove('active'); s1.classList.add('done');
    s1.querySelector('.step-dot').innerHTML = '<i class="fas fa-check" aria-hidden="true"></i>';
    line.classList.add('done');
    s2.classList.add('active');
}

/* ── FORM SUBMIT ── */
form.addEventListener('submit', async e => {
    e.preventDefault();
    const email = emailEl.value.trim();

    if(!email){
        emailGroup.classList.add('error');
        emailMsg.textContent = 'Vui lòng nhập email';
        emailEl.focus();
        // shake
        emailGroup.style.animation = 'shake 0.4s ease';
        setTimeout(()=>emailGroup.style.animation='', 400);
        return;
    }
    if(!validateEmail(email)){
        emailGroup.classList.add('error');
        emailMsg.textContent = 'Email không hợp lệ';
        emailEl.focus();
        emailGroup.style.animation = 'shake 0.4s ease';
        setTimeout(()=>emailGroup.style.animation='', 400);
        return;
    }

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    try {
        const res  = await fetch('/forgot-password', {
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body: new URLSearchParams({ email }),
        });
        const data = await res.json();

        if(res.ok && data.success){
            // Show success state
            form.style.display = 'none';
            document.getElementById('successEmail').textContent = email;
            document.getElementById('successState').style.display = 'flex';
            setStep2Done();
            showToast('Reset link sent! Check your inbox 📬','success', 4000);
            // If backend returns direct redirect link
            if(data.reset_link){
                setTimeout(()=>{ window.location.href = data.reset_link; }, 2500);
            }
        } else {
            showToast(data.message || 'Email not found','error');
            emailGroup.classList.add('error');
            emailMsg.textContent = data.message || 'Email not found';
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
        }
    } catch {
        showToast('Network error. Please try again.','error');
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
    }
});

// shake keyframe
const s = document.createElement('style');
s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}';
document.head.appendChild(s);
</script>
</body>
</html>
