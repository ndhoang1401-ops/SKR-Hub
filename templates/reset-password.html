<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR-HUB · Reset Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Quicksand:wght@400;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <style>
/* FIX □ icon */
.fa,.fas,.far,.fab,.fal,i[class*="fa-"]{
    font-family:"Font Awesome 6 Free","Font Awesome 6 Brands"!important;
    font-style:normal!important;
}
.fas,.fa-solid  {font-weight:900!important}
.far,.fa-regular{font-weight:400!important}

:root {
    --sakura-pink:  #ff7eb3;
    --sakura-glow:  #ff2d78;
    --cyber-blue:   #00eaff;
    --cyber-purple: #9d4edd;
    --bg-dark:      #0f0c29;
    --glass-bg:     rgba(255,126,179,0.12);
    --glass-border: rgba(255,255,255,0.18);
    --text-primary: #ffffff;
    --text-muted:   rgba(255,255,255,0.65);
    --shadow-pink:  rgba(255,126,179,0.50);
    --color-error:  #ff4d4d;
    --color-success:#00c896;
    --ease-smooth:  cubic-bezier(0.175,0.885,0.32,1.275);
    --ease-bounce:  cubic-bezier(0.68,-0.55,0.27,1.55);
    --neon-shadow:  0 0 20px rgba(255,126,179,0.50),
                    0 0 40px rgba(0,234,255,0.25);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;font-family:'Quicksand',sans-serif}

body {
    min-height:100vh;
    background:radial-gradient(circle at 30% 30%,#2d1b4e 0%,#0f0c29 80%,#1a1a2e 100%);
    display:flex;align-items:center;justify-content:center;
    padding:20px;position:relative;overflow:hidden;
    animation:pageIn 0.6s var(--ease-smooth) both;
}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* dot-grid bg */
body::before{
    content:'';position:fixed;inset:0;
    background-image:
        radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px),
        radial-gradient(circle,rgba(255,126,179,0.07) 1px,transparent 1px);
    background-size:60px 60px,90px 90px;
    background-position:0 0,30px 30px;
    pointer-events:none;z-index:0;
}

/* floating orbs */
.orb{
    position:fixed;border-radius:50%;pointer-events:none;z-index:0;
    animation:orbFloat 8s ease-in-out infinite alternate;
    filter:blur(60px);opacity:.35;
}
.orb-1{width:300px;height:300px;background:var(--sakura-pink);top:-80px;left:-80px;animation-delay:0s}
.orb-2{width:250px;height:250px;background:var(--cyber-purple);bottom:-60px;right:-60px;animation-delay:-3s}
.orb-3{width:180px;height:180px;background:var(--cyber-blue);top:50%;right:5%;animation-delay:-5s}
@keyframes orbFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(30px) scale(1.08)}}

/* ===== GLASS CARD ===== */
.glass-card{
    background:var(--glass-bg);
    /* FIX E1 & E2: -webkit- TRƯỚC standard */
    -webkit-backdrop-filter:blur(25px);
    backdrop-filter:blur(25px);
    border:1px solid var(--glass-border);
    border-radius:40px;padding:44px 40px;
    width:100%;max-width:460px;
    box-shadow:0 30px 60px rgba(0,0,0,0.35), var(--neon-shadow);
    animation:cardAppear 0.8s var(--ease-smooth) both;
    position:relative;z-index:10;
    isolation:isolate;
}
@keyframes cardAppear{from{opacity:0;transform:scale(0.92) translateY(28px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* brand top */
.brand{
    text-align:center;
    font-family:'Orbitron',sans-serif;
    font-size:.85rem;letter-spacing:6px;
    color:var(--text-muted);
    margin-bottom:8px;
    text-transform:uppercase;
}

/* ===== HEADING ===== */
h1{
    font-family:'Orbitron',sans-serif;
    font-size:1.6rem;text-align:center;
    margin-bottom:32px;
    display:flex;align-items:center;justify-content:center;gap:12px;
    /* FIX: -webkit-background-clip TRƯỚC background-clip */
    background:linear-gradient(90deg,#fff,var(--sakura-pink),var(--cyber-blue));
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
    animation:shine 6s linear infinite;
}
h1 i{
    /* icon không dùng gradient text */
    background:none;
    -webkit-text-fill-color:var(--sakura-pink);
    color:var(--sakura-pink);
    filter:drop-shadow(0 0 8px var(--sakura-pink));
}
@keyframes shine{to{background-position:200% center}}

/* ===== INPUT GROUP ===== */
.input-group{position:relative;margin-bottom:20px}

.field-icon{
    position:absolute;left:20px;top:50%;transform:translateY(-50%);
    color:var(--sakura-pink);font-size:1.1rem;z-index:2;pointer-events:none;
    transition:color 0.3s ease,transform 0.3s ease;
    filter:drop-shadow(0 0 5px var(--sakura-pink));
}

.candy-input{
    width:100%;padding:16px 48px 16px 52px;
    border:2px solid transparent;border-radius:50px;
    background:rgba(255,255,255,0.10);
    -webkit-backdrop-filter:blur(5px);
    backdrop-filter:blur(5px);
    color:var(--text-primary);font-size:15px;outline:none;
    transition:border-color 0.35s ease,background 0.35s ease,
               box-shadow 0.35s ease,transform 0.35s var(--ease-smooth);
    will-change:transform;
}
.candy-input:focus{
    border-color:var(--sakura-pink);
    background:rgba(255,126,179,0.18);
    box-shadow:var(--neon-shadow);
    transform:scale(1.02);
}
.candy-input:focus ~ .field-icon{
    color:var(--cyber-blue);
    transform:translateY(-50%) scale(1.15);
}
.candy-input::placeholder{color:var(--text-muted)}
.candy-input:focus-visible{outline:3px solid var(--cyber-blue);outline-offset:2px}

/* toggle pw button */
.toggle-pw{
    position:absolute;right:18px;top:50%;transform:translateY(-50%);
    background:none;border:none;
    color:var(--text-muted);font-size:.95rem;cursor:pointer;
    padding:4px;z-index:3;transition:color 0.25s ease;
}
.toggle-pw:hover{color:var(--sakura-pink)}

/* ===== PASSWORD STRENGTH ===== */
.pw-strength{
    display:flex;gap:5px;height:4px;margin:6px 20px 0;
}
.pw-strength span{
    flex:1;border-radius:4px;background:rgba(255,255,255,0.10);
    transition:background 0.4s ease;
}
.pw-strength[data-level="1"] span:nth-child(1)  {background:var(--color-error)}
.pw-strength[data-level="2"] span:nth-child(-n+2){background:#ffb347}
.pw-strength[data-level="3"] span                {background:var(--color-success)}

/* field validation */
.input-group.error .candy-input{border-color:var(--color-error);background:rgba(255,77,77,0.10)}
.input-group.success .candy-input{border-color:var(--color-success);background:rgba(0,200,150,0.08)}
.field-msg{
    font-size:12px;font-weight:500;margin:5px 0 0 20px;
    opacity:0;transform:translateY(-4px);
    transition:opacity 0.3s ease,transform 0.3s ease;
}
.input-group.error   .field-msg{color:var(--color-error);  opacity:1;transform:translateY(0)}
.input-group.success .field-msg{color:var(--color-success);opacity:1;transform:translateY(0)}

/* ===== BUTTON ===== */
.candy-btn{
    width:100%;padding:16px;border:none;border-radius:50px;
    background:linear-gradient(135deg,var(--sakura-pink),var(--sakura-glow));
    color:#fff;font-weight:700;font-size:1rem;
    cursor:pointer;letter-spacing:.5px;
    transition:transform 0.4s var(--ease-bounce),box-shadow 0.4s ease;
    box-shadow:0 10px 25px var(--shadow-pink);
    display:flex;align-items:center;justify-content:center;gap:10px;
    position:relative;overflow:hidden;will-change:transform;
    margin-top:8px;
}
.candy-btn::before{
    content:'';position:absolute;inset:0;left:-100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28),transparent);
    transition:left 0.5s ease;
}
.candy-btn:hover:not(:disabled)::before{left:100%}
.candy-btn:hover:not(:disabled){
    transform:translateY(-5px) scale(1.02);
    box-shadow:0 20px 35px var(--shadow-pink);
}
.candy-btn:active:not(:disabled){transform:translateY(0) scale(0.98)}
.candy-btn:focus-visible{outline:3px solid var(--cyber-blue);outline-offset:3px}
.candy-btn:disabled{opacity:.65;cursor:not-allowed}

/* loading spinner */
.candy-btn.loading{color:transparent;pointer-events:none}
.candy-btn.loading::after{
    content:'';position:absolute;
    width:22px;height:22px;
    top:50%;left:50%;margin:-11px 0 0 -11px;
    border:3px solid rgba(255,255,255,0.35);
    border-top-color:#fff;
    border-radius:50%;animation:spin 0.75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== DIVIDER ===== */
.divider{
    display:flex;align-items:center;gap:12px;
    margin:22px 0;color:var(--text-muted);font-size:13px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.12)}

/* ===== BACK LINK ===== */
.back-link{
    display:flex;align-items:center;justify-content:center;gap:8px;
    color:var(--text-muted);text-decoration:none;font-size:.9rem;
    transition:color 0.3s ease,transform 0.3s ease;
    font-weight:600;
}
.back-link:hover{color:var(--text-primary);transform:translateX(-4px)}
.back-link:focus-visible{outline:3px solid var(--cyber-blue);outline-offset:3px;border-radius:8px}

/* ===== SUCCESS STATE ===== */
.success-state{
    text-align:center;padding:20px 0;
    display:none;flex-direction:column;align-items:center;gap:14px;
}
.success-icon{
    width:72px;height:72px;border-radius:50%;
    background:rgba(0,200,150,0.20);
    border:2px solid var(--color-success);
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;color:var(--color-success);
    box-shadow:0 0 25px rgba(0,200,150,0.35);
    animation:popIn 0.5s var(--ease-bounce) both;
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-family:'Orbitron',sans-serif;color:var(--color-success);font-size:1.1rem}
.success-msg  {color:var(--text-muted);font-size:14px}
.redirect-bar {
    width:200px;height:4px;border-radius:4px;
    background:rgba(255,255,255,0.10);overflow:hidden;margin-top:4px;
}
.redirect-fill{
    height:100%;width:0%;border-radius:4px;
    background:linear-gradient(90deg,var(--sakura-pink),var(--cyber-blue));
    transition:width 2s linear;
}

/* ===== TOAST ===== */
.toast{
    position:fixed;bottom:28px;left:50%;
    transform:translateX(-50%) translateY(28px);
    background:rgba(255,255,255,0.95);
    -webkit-backdrop-filter:blur(20px);
    backdrop-filter:blur(20px);
    color:#1a1a2e;padding:13px 28px;border-radius:60px;
    box-shadow:0 20px 40px rgba(0,0,0,0.28),var(--neon-shadow);
    display:flex;align-items:center;gap:10px;
    opacity:0;visibility:hidden;
    transition:opacity 0.4s ease,visibility 0.4s ease,
               transform 0.4s var(--ease-bounce);
    z-index:10000;font-weight:600;font-size:.95rem;
    will-change:transform,opacity;
}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.toast.error  {background:linear-gradient(135deg,#ff4d4d,#f9cbca);color:#fff}
.toast.success{background:linear-gradient(135deg,#00b09b,#96c93d);color:#fff}
.toast.warning{background:linear-gradient(135deg,#f2994a,#f2c94c);color:#fff}

@media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    .orb{display:none}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    </style>
</head>
<body>

<!-- Floating orbs -->
<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>
<div class="orb orb-3" aria-hidden="true"></div>

<div class="glass-card" role="main">
    <p class="brand">SKR‑HUB</p>

    <h1>
        <i class="fas fa-key" aria-hidden="true"></i>
        Reset Password
    </h1>

    <!-- FORM -->
    <form id="resetForm" novalidate aria-label="Reset password form">

        <div class="input-group" id="pwGroup">
            <label for="password" class="sr-only">New password</label>
            <input type="password" id="password" class="candy-input"
                   placeholder="New password (min 6 chars)"
                   autocomplete="new-password"
                   aria-label="New password"
                   aria-describedby="pwStrengthMsg">

            <i class="fas fa-lock field-icon" aria-hidden="true"></i>

            <button type="button" class="toggle-pw" id="togglePw"
                    aria-label="Show password" title="Show/hide password">
                <i class="fas fa-eye" aria-hidden="true"></i>
            </button>
        </div>

        <!-- Password strength bar -->
        <div class="pw-strength" id="pwStrength" aria-hidden="true">
            <span></span><span></span><span></span>
        </div>
        <p class="field-msg" id="pwMsg" role="status" aria-live="polite"></p>

        <button type="submit" class="candy-btn" id="submitBtn" aria-label="Reset password">
            <i class="fas fa-sync-alt" aria-hidden="true"></i>
            Reset Password
        </button>
    </form>

    <!-- SUCCESS STATE (hidden until success) -->
    <div class="success-state" id="successState" aria-live="polite">
        <div class="success-icon"><i class="fas fa-check" aria-hidden="true"></i></div>
        <p class="success-title">Password Reset!</p>
        <p class="success-msg">Redirecting to login in 2 seconds…</p>
        <div class="redirect-bar"><div class="redirect-fill" id="redirectFill"></div></div>
    </div>

    <div class="divider">or</div>

    <a href="/" class="back-link" aria-label="Back to login page">
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
        Back to Login
    </a>
</div>

<!-- TOAST -->
<div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true">
    <i class="fas fa-info-circle" id="toastIcon" aria-hidden="true"></i>
    <span id="toastMsg"></span>
</div>

<script>
/* =====================================================
   INIT
   ===================================================== */
// Extract token from URL — support /reset-password/<token>
const token = window.location.pathname.split('/').pop();

const form      = document.getElementById('resetForm');
const pwInput   = document.getElementById('password');
const submitBtn = document.getElementById('submitBtn');
const pwGroup   = document.getElementById('pwGroup');
const pwMsg     = document.getElementById('pwMsg');
const pwStrength= document.getElementById('pwStrength');
const togglePw  = document.getElementById('togglePw');

/* =====================================================
   TOAST — XSS safe, no className override bug
   ===================================================== */
let _toastTimer=null;
function showToast(msg, type='info', dur=3200){
    const toast=document.getElementById('toast');
    const icons={success:'fa-check-circle',error:'fa-exclamation-circle',
                 warning:'fa-exclamation-triangle',info:'fa-info-circle'};
    // FIX: set className FIRST, then add 'show' — avoids overwriting 'show'
    toast.className=`toast ${type}`;
    document.getElementById('toastIcon').className=`fas ${icons[type]||icons.info}`;
    document.getElementById('toastMsg').textContent=msg;
    void toast.offsetHeight; // force reflow
    toast.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer=setTimeout(()=>toast.classList.remove('show'),dur);
}

/* =====================================================
   PASSWORD STRENGTH
   ===================================================== */
function getPwStrength(pw){
    let s=0;
    if(pw.length>=8)           s++;
    if(/[A-Z]/.test(pw))       s++;
    if(/[0-9]/.test(pw))       s++;
    if(/[^A-Za-z0-9]/.test(pw))s++;
    if(s<=1) return 1;
    if(s<=2) return 2;
    return 3;
}

pwInput.addEventListener('input',()=>{
    const v=pwInput.value;
    // strength bar
    pwStrength.dataset.level=v.length?getPwStrength(v):'';
    // inline validation
    if(v.length===0){
        pwGroup.classList.remove('error','success');
        pwMsg.textContent='';
    } else if(v.length<6){
        pwGroup.classList.add('error');pwGroup.classList.remove('success');
        pwMsg.textContent='Minimum 6 characters required';
    } else {
        pwGroup.classList.add('success');pwGroup.classList.remove('error');
        pwMsg.textContent='✓ Looks good!';
    }
});

/* =====================================================
   TOGGLE SHOW/HIDE PASSWORD
   ===================================================== */
togglePw.addEventListener('click',()=>{
    const show=pwInput.type==='password';
    pwInput.type=show?'text':'password';
    togglePw.querySelector('i').className=`fas fa-eye${show?'-slash':''}`;
    togglePw.setAttribute('aria-label',show?'Hide password':'Show password');
});

/* =====================================================
   FORM SUBMIT
   ===================================================== */
form.addEventListener('submit', async e=>{
    e.preventDefault();
    const pw=pwInput.value.trim();

    if(pw.length<6){
        pwGroup.classList.add('error');
        showToast('Password must be at least 6 characters','error');
        pwInput.focus();
        // shake animation
        pwGroup.style.animation='shake 0.4s ease';
        setTimeout(()=>pwGroup.style.animation='',400);
        return;
    }

    submitBtn.classList.add('loading');
    submitBtn.disabled=true;

    try {
        const res=await fetch(`/reset-password/${token}`,{
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body:new URLSearchParams({password:pw}),
        });
        const data=await res.json();

        if(res.ok){
            // show success state
            form.style.display='none';
            const ss=document.getElementById('successState');
            ss.style.display='flex';
            // animate redirect bar
            setTimeout(()=>{
                document.getElementById('redirectFill').style.width='100%';
            },50);
            setTimeout(()=>{ window.location.href='/'; },2200);
        } else {
            showToast(data.error||'Reset failed. Please try again.','error');
            submitBtn.classList.remove('loading');
            submitBtn.disabled=false;
        }
    } catch {
        showToast('Network error. Please try again.','error');
        submitBtn.classList.remove('loading');
        submitBtn.disabled=false;
    }
});

// Inject shake keyframe
const s=document.createElement('style');
s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}';
document.head.appendChild(s);
</script>
</body>
</html>
