<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR-HUB · Self‑Learning </title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== RESET & VARIABLES (giống dashboard) ===== */
        :root {
            --sakura-pink: #ff7eb3;
            --sakura-glow: #ff2d78;
            --cyber-blue: #00eaff;
            --cyber-purple: #9d4edd;
            --bg-dark: #0f0c29;
            --glass-bg: rgba(255, 126, 179, 0.12);
            --glass-border: rgba(255, 255, 255, 0.18);
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-bounce: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            --neon-shadow: 0 0 15px rgba(255, 126, 179, 0.5), 0 0 30px rgba(0, 234, 255, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 30%, #2d1b4e 0%, #0f0c29 80%, #1a1a2e 100%);
            color: white;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="30" r="2" fill="rgba(255,255,255,0.05)"/><circle cx="10" cy="20" r="1.5" fill="rgba(255,126,179,0.1)"/><circle cx="50" cy="40" r="2.5" fill="rgba(0,234,255,0.1)"/></svg>');
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== SAKURA PETALS 3D (giống dashboard) ===== */
        .sakura-petal {
            position: fixed; top: -10%; z-index: 1; pointer-events: none;
            font-size: 20px; opacity: 0.8;
            animation: fall3D linear forwards;
            transform-style: preserve-3d;
            filter: drop-shadow(0 0 5px rgba(255,126,179,0.5));
        }
        @keyframes fall3D {
            0% { transform: translateY(0) rotate(0deg) translateZ(0); opacity: 0.9; }
            30% { transform: translateY(30vh) rotate(180deg) translateZ(50px); opacity: 0.8; }
            60% { transform: translateY(60vh) rotate(360deg) translateZ(100px); opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg) translateZ(200px); opacity: 0; }
        }
        .sakura-petal.linger {
            animation: lingerEffect 1.5s ease-out forwards;
        }
        @keyframes lingerEffect {
            0% { transform: scale(1) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 10px gold); }
            50% { transform: scale(2) rotate(180deg); opacity: 0.8; filter: drop-shadow(0 0 30px hotpink); }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        /* ===== WRAPPER CHÍNH ===== */
        .wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 20px 20px;
            position: relative;
            z-index: 10;
            flex: 1;
            width: 100%;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 15px 30px;
            animation: slideDown 0.8s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            background: linear-gradient(90deg, #fff, var(--sakura-pink), var(--cyber-blue));
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: waveMove 6s linear infinite;
        }
        @keyframes waveMove { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        /* ===== NAV BUTTONS ===== */
        .nav-buttons {
            display: flex;
            gap: 15px;
        }
        .nav-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            transition: var(--transition-bounce);
            backdrop-filter: blur(10px);
        }
        .nav-btn:hover {
            background: var(--sakura-pink);
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 0 20px var(--sakura-pink);
        }

        /* ===== GRID 2 CỘT ===== */
        .grid {
            display: grid;
            grid-template-columns: 1.4fr 0.6fr;
            gap: 30px;
        }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: var(--transition-smooth);
            animation: cardAppear 0.8s ease-out;
        }
        .glass-card:hover {
            border-color: var(--sakura-pink);
            box-shadow: 0 0 40px rgba(255,126,179,0.4), 0 20px 40px rgba(0,0,0,0.4);
            transform: translateY(-5px);
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== FORM THÊM TASK ===== */
        .task-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .candy-input {
            padding: 14px 20px;
            border: 2px solid transparent;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.4s;
        }
        .candy-input:focus {
            border-color: var(--sakura-pink);
            background: rgba(255,126,179,0.2);
            box-shadow: 0 0 30px var(--sakura-pink);
            transform: scale(1.02);
        }
        .candy-input::placeholder { color: rgba(255,255,255,0.6); }

        .candy-select {
            padding: 14px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            color: white;
            font-size: 15px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 20px center;
        }
        .candy-select:focus {
            border-color: var(--cyber-blue);
            box-shadow: 0 0 30px var(--cyber-blue);
        }
        .candy-select option { background: #1a1a2e; color: white; }

        /* ===== BUTTON PRIMARY (CANDY) ===== */
        .candy-btn {
            padding: 14px 25px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-glow));
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-bounce);
            box-shadow: 0 10px 20px rgba(255,126,179,0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .candy-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 30px rgba(255,126,179,0.6), 0 0 20px var(--sakura-pink);
        }
        .candy-btn.small {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        /* ===== FILTERS ===== */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        .filter-btn {
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-btn.active {
            background: var(--sakura-pink);
            border-color: white;
            box-shadow: 0 0 15px var(--sakura-pink);
        }
        .filter-btn:hover { background: rgba(255,126,179,0.3); }

        /* ===== TASK LIST ===== */
        .task-list { margin-top: 20px; }
        .task-item {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 25px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--sakura-pink);
            animation: slideIn 0.3s ease;
            transition: all 0.3s;
        }
        .task-item:hover {
            background: rgba(255,126,179,0.15);
            transform: translateX(8px);
            box-shadow: 0 5px 15px rgba(255,126,179,0.3);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .task-item.completed { opacity: 0.6; border-left-color: #888; }
        .task-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .task-info input[type="checkbox"] {
            width: 20px; height: 20px;
            accent-color: var(--sakura-pink);
            cursor: pointer;
        }
        .task-title {
            font-weight: 600;
        }
        .task-meta {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .task-actions {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            width: 35px; height: 35px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.edit { background: #3498db; }
        .icon-btn.delete { background: #e74c3c; }
        .icon-btn:hover { transform: scale(1.2); box-shadow: 0 0 15px currentColor; }

        /* ===== PROGRESS CIRCLE ===== */
        .stat-box {
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .progress-circle {
            width: 140px; height: 140px;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            background: conic-gradient(var(--sakura-pink) 0deg, rgba(255,255,255,0.1) 0deg);
            transition: 0.5s;
            box-shadow: 0 0 30px var(--sakura-pink);
            position: relative;
        }
        .progress-circle::after {
            content: '';
            position: absolute;
            width: 110px; height: 110px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }
        .progress-circle span {
            position: relative;
            z-index: 2;
        }

        /* ===== CALENDAR ===== */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .calendar-day {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 12px 5px;
            text-align: center;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .calendar-day:hover {
            background: rgba(255,126,179,0.2);
            transform: scale(1.05);
        }
        .calendar-day.today {
            background: var(--sakura-pink);
            box-shadow: 0 0 15px var(--sakura-pink);
        }
        .calendar-day span { display: block; font-size: 0.7rem; opacity: 0.7; }

        /* ===== FOOTER GIỐNG DASHBOARD ===== */
        .footer-premium {
            margin-top: 50px;
            padding: 30px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            width: 100%;
        }
        .owner {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--sakura-pink), var(--cyber-blue));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        /* ===== TOAST SIÊU CẤP ===== */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: auto;
            max-width: 90%;
        }
        .toast {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            color: #1a1a2e;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), 0 0 30px rgba(255,126,179,0.3);
            border: 1px solid rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: auto;
            font-size: 1rem;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success { background: linear-gradient(135deg, #00b09b, #96c93d); color: white; }
        .toast.error { background: linear-gradient(135deg, #ff4d4d, #f9cbca); color: white; }
        .toast.warning { background: linear-gradient(135deg, #f2994a, #f2c94c); color: white; }
        .toast.info { background: linear-gradient(135deg, #56ccf2, #2f80ed); color: white; }
        .toast i { font-size: 1.4rem; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; text-align: center; }
            .task-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .task-actions { align-self: flex-end; }
            .toast-container { width: 90%; }
        }
    </style>
</head>
<body>

    <!-- SAKURA PETALS (tự động sinh) -->
    
    <div class="wrapper">
        <!-- HEADER -->
        <div class="header">
            <h1>SELF‑LEARNING </h1>
            <div class="nav-buttons">
                <button class="nav-btn" id="statsBtn" title="Statistics"><i class="fas fa-chart-line"></i></button>
                <button class="nav-btn" id="dashboardBtn" title="Dashboard"><i class="fas fa-home"></i></button>
            </div>
        </div>

        <!-- GRID 2 CỘT -->
        <div class="grid">
            <!-- CỘT TRÁI: TASK MANAGER -->
            <div class="glass-card">
                <!-- FORM THÊM TASK -->
                <div class="task-form">
                    <input type="text" id="title" class="candy-input" placeholder="Task title">
                    <input type="date" id="date" class="candy-input">
                    <select id="priority" class="candy-select">
                        <option value="Low">🔹 Low</option>
                        <option value="Medium">🔸 Medium</option>
                        <option value="High">🔺 High</option>
                    </select>
                    <button class="candy-btn" id="addBtn"><i class="fas fa-plus"></i> Add</button>
                </div>

                <!-- THANH TÌM KIẾM -->
                <input type="text" id="search" class="candy-input" placeholder="🔍 Search tasks..." style="margin-bottom: 20px;">

                <!-- BỘ LỌC -->
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                    <button class="filter-btn" id="clearBtn">Clear done</button>
                </div>

                <!-- DANH SÁCH TASK -->
                <div id="taskList" class="task-list"></div>
            </div>

            <!-- CỘT PHẢI: THỐNG KÊ & LỊCH -->
            <div>
                <!-- PROGRESS CIRCLE -->
                <div class="glass-card stat-box">
                    <h3>📊 Progress</h3>
                    <div class="progress-circle" id="progressCircle"><span>0%</span></div>
                    <div id="statText" style="font-size: 1.2rem;">0/0 completed</div>
                </div>

                <!-- CALENDAR -->
                <div class="glass-card">
                    <h3>📅 Weekly calendar</h3>
                    <div id="calendar" class="calendar-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER (giống dashboard) -->
    <footer class="footer-premium">
        <p>© 2026 · Mastered by <span class="owner">Nguyễn Doãn Hoàng</span></p>
        <p style="font-style: italic; opacity: 0.7;">"Discipline is the bridge between goals and accomplishment."</p>
    </footer>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ==================== SAKURA 3D ====================
            const icons = ["🌸", "💮", "✨", "🌸", "🌸"];
            function createPetal() {
                const petal = document.createElement("div");
                petal.className = "sakura-petal";
                petal.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                petal.style.left = Math.random() * 100 + "vw";
                petal.style.fontSize = Math.random() * 20 + 15 + "px";
                petal.style.animationDuration = Math.random() * 6 + 6 + "s";
                petal.style.animationDelay = Math.random() * 2 + "s";
                petal.style.opacity = Math.random() * 0.6 + 0.4;
                document.body.appendChild(petal);

                petal.addEventListener('mouseenter', () => {
                    petal.classList.add('linger');
                    setTimeout(() => petal.remove(), 1000);
                });

                setTimeout(() => {
                    if (Math.random() < 0.15) {
                        petal.classList.add('linger');
                        setTimeout(() => petal.remove(), 1000);
                    } else {
                        petal.remove();
                    }
                }, 8000);
            }
            setInterval(() => {
                if (document.visibilityState === 'visible') createPetal();
            }, 300);

            // ==================== TASK STATE ====================
            let tasks = JSON.parse(localStorage.getItem('skr_selflearning')) || [];
            let currentFilter = 'all';

            // ==================== DOM ELEMENTS ====================
            const taskListEl = document.getElementById('taskList');
            const progressCircle = document.getElementById('progressCircle');
            const statText = document.getElementById('statText');
            const calendarEl = document.getElementById('calendar');
            const toastContainer = document.getElementById('toastContainer');
            const titleInput = document.getElementById('title');
            const dateInput = document.getElementById('date');
            const prioritySelect = document.getElementById('priority');
            const searchInput = document.getElementById('search');

            // ==================== HELPER FUNCTIONS ====================
            function saveTasks() {
                localStorage.setItem('skr_selflearning', JSON.stringify(tasks));
            }

            // Toast system
            function showToast(message, type = 'success', duration = 3000) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icon = {
                    success: 'fa-check-circle',
                    error: 'fa-exclamation-circle',
                    warning: 'fa-exclamation-triangle',
                    info: 'fa-info-circle'
                }[type] || 'fa-bell';
                toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
                toastContainer.appendChild(toast);
                
                // Trigger animation
                setTimeout(() => toast.classList.add('show'), 10);
                
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                }, duration);
            }

            function getFilteredTasks() {
                let filtered = tasks;
                const keyword = searchInput.value.toLowerCase().trim();
                if (keyword) {
                    filtered = filtered.filter(t => t.title.toLowerCase().includes(keyword));
                }
                if (currentFilter === 'active') filtered = filtered.filter(t => !t.completed);
                if (currentFilter === 'completed') filtered = filtered.filter(t => t.completed);
                return filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            }

            // ==================== RENDER TASKS ====================
            function renderTasks() {
                const filtered = getFilteredTasks();
                if (filtered.length === 0) {
                    taskListEl.innerHTML = '<p style="opacity:0.5; text-align:center;">✨ No tasks found. Add one!</p>';
                } else {
                    taskListEl.innerHTML = filtered.map(task => `
                        <div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
                            <div class="task-info">
                                <input type="checkbox" ${task.completed ? 'checked' : ''} class="task-checkbox">
                                <div>
                                    <div class="task-title">${task.title}</div>
                                    <div class="task-meta">${task.date} · ${task.priority}</div>
                                </div>
                            </div>
                            <div class="task-actions">
                                <button class="icon-btn edit" title="Edit"><i class="fas fa-edit"></i></button>
                                <button class="icon-btn delete" title="Delete"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');
                }
                updateStats();
                renderCalendar();
            }

            // ==================== UPDATE STATS ====================
            function updateStats() {
                const total = tasks.length;
                const done = tasks.filter(t => t.completed).length;
                const percent = total ? Math.round((done / total) * 100) : 0;
                const angle = (percent / 100) * 360;
                progressCircle.style.background = `conic-gradient(var(--sakura-pink) ${angle}deg, rgba(255,255,255,0.1) 0deg)`;
                progressCircle.querySelector('span').innerText = percent + '%';
                statText.innerText = `${done}/${total} completed`;
            }

            // ==================== RENDER CALENDAR ====================
            function renderCalendar() {
                const today = new Date();
                const start = new Date(today);
                start.setDate(today.getDate() - today.getDay());

                let html = '';
                for (let i = 0; i < 7; i++) {
                    const day = new Date(start);
                    day.setDate(start.getDate() + i);
                    const dayStr = day.toISOString().split('T')[0];
                    const count = tasks.filter(t => t.date === dayStr).length;
                    const isToday = dayStr === today.toISOString().split('T')[0];
                    html += `<div class="calendar-day ${isToday ? 'today' : ''}">
                        <strong>${day.getDate()}</strong>
                        <span>${count} tasks</span>
                    </div>`;
                }
                calendarEl.innerHTML = html;
            }

            // ==================== ADD TASK ====================
            function addTask() {
                const title = titleInput.value.trim();
                const date = dateInput.value;
                const priority = prioritySelect.value;
                if (!title || !date) {
                    showToast('Please enter title and date', 'warning');
                    return;
                }
                const newTask = {
                    id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + '' + Math.random(),
                    title,
                    date,
                    priority,
                    completed: false
                };
                tasks.push(newTask);
                saveTasks();
                renderTasks();
                titleInput.value = '';
                showToast('✅ Task added', 'success');
            }

            // ==================== TOGGLE COMPLETE ====================
            function toggleComplete(id, checked) {
                const task = tasks.find(t => t.id === id);
                if (task) {
                    task.completed = checked;
                    saveTasks();
                    renderTasks();
                    showToast(checked ? '✅ Task completed' : '🔄 Task reopened', 'info');
                }
            }

            // ==================== DELETE TASK ====================
            function deleteTask(id) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
                showToast('🗑️ Task deleted', 'warning');
            }

            // ==================== EDIT TASK ====================
            function editTask(id) {
                const task = tasks.find(t => t.id === id);
                if (!task) return;
                const newTitle = prompt('Edit task title:', task.title);
                if (newTitle && newTitle.trim()) {
                    task.title = newTitle.trim();
                    saveTasks();
                    renderTasks();
                    showToast('✏️ Task updated', 'info');
                }
            }

            // ==================== EVENT DELEGATION ====================
            taskListEl.addEventListener('click', (e) => {
                const taskItem = e.target.closest('.task-item');
                if (!taskItem) return;
                const id = taskItem.dataset.id;

                if (e.target.closest('.delete')) {
                    deleteTask(id);
                } else if (e.target.closest('.edit')) {
                    editTask(id);
                }
            });

            taskListEl.addEventListener('change', (e) => {
                if (e.target.classList.contains('task-checkbox')) {
                    const taskItem = e.target.closest('.task-item');
                    if (taskItem) {
                        toggleComplete(taskItem.dataset.id, e.target.checked);
                    }
                }
            });

            // ==================== FILTER BUTTONS ====================
            document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderTasks();
                });
            });

            // ==================== CLEAR COMPLETED ====================
            document.getElementById('clearBtn').addEventListener('click', () => {
                tasks = tasks.filter(t => !t.completed);
                saveTasks();
                renderTasks();
                showToast('🧹 Completed tasks cleared', 'success');
            });

            // ==================== SEARCH ====================
            searchInput.addEventListener('input', renderTasks);

            // ==================== ADD BUTTON ====================
            document.getElementById('addBtn').addEventListener('click', addTask);

            // ==================== ENTER KEY ====================
            titleInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });

            // ==================== NAVIGATION ====================
            document.getElementById('statsBtn').addEventListener('click', () => {
                window.location.href = '/stats';
            });
            document.getElementById('dashboardBtn').addEventListener('click', () => {
                window.location.href = '/dashboard';
            });

            // ==================== INIT ====================
            renderTasks();
            // Đặt ngày mặc định cho input date là hôm nay
            const today = new Date().toISOString().split('T')[0];
            if (dateInput) dateInput.value = today;
        })();
    </script>
</body>
</html>
