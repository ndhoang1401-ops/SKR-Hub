<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR-HUB · Self‑Learning </title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Quicksand:wght@400;600;700&display=swap"
          rel="stylesheet">

    <style>
        /* ================================================
           SKR-HUB SELF-LEARNING — CSS VIP PRO MAX 2026
           ================================================ */

        /* ---------- 1. RESET & BIẾN TOÀN CỤC ---------- */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Màu sắc chủ đạo - tươi sáng, contrast cao */
            --sakura-pink: #ff8ab5;
            --sakura-glow: #ff5f9e;
            --cyber-blue: #6ad4ff;
            --cyber-purple: #c08aff;
            --neon-green: #7effb2;
            --gold: #ffdb7c;
            --color-high: #ff7b7b;
            --color-med: #ffc156;
            --color-low: #69db7e;

            /* Nền & card - tối vừa, dễ đọc */
            --bg-dark: #120e1f;
            --bg-card: #281f3a;
            --glass-bg: rgba(150, 120, 200, 0.15);
            --glass-border: rgba(255, 255, 255, 0.15);

            /* Văn bản - trắng sáng, contrast > 7:1 */
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.85);
            --text-faint: rgba(255, 255, 255, 0.55);

            /* Hiệu ứng đổ bóng */
            --shadow-pink: 0 0 30px rgba(255, 138, 181, 0.5);
            --shadow-blue: 0 0 30px rgba(106, 212, 255, 0.4);
            --card-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);

            /* Border radius */
            --radius-md: 24px;
            --radius-lg: 32px;
            --radius-pill: 60px;

            /* Easing */
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition: all 0.3s var(--ease-smooth);
            --transition-bounce: all 0.5s var(--ease-bounce);
        }

        body {
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at 30% 30%, #32255e, #120e1f 80%);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background 0.5s ease;
            position: relative;
            isolation: isolate;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 138, 181, 0.06) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(106, 212, 255, 0.04) 0%, transparent 35%),
                radial-gradient(circle at 40% 80%, rgba(192, 138, 255, 0.03) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--sakura-pink), var(--cyber-blue));
            border-radius: 10px;
        }

        /* ---------- 2. SAKURA ---------- */
        .sakura-petal {
            position: fixed;
            top: -10%;
            z-index: 1;
            pointer-events: none;
            font-size: 18px;
            opacity: 0.3;
            animation: fall linear forwards;
            filter: drop-shadow(0 0 4px rgba(255,138,181,0.3));
            will-change: transform;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* ---------- 3. HEADER & NAV ---------- */
        .wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px;
            position: relative;
            z-index: 10;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(40, 31, 58, 0.7);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-pill);
            padding: 12px 28px;
            margin-bottom: 28px;
            box-shadow: var(--card-shadow);
        }

        .page-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.3rem, 3vw, 2rem);
            background: linear-gradient(90deg, #fff, var(--sakura-pink), var(--cyber-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition-bounce);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            /* aria-label được đặt trong HTML, không cần trong CSS */
        }
        .nav-btn:hover {
            background: var(--sakura-pink);
            transform: scale(1.15) rotate(8deg);
            box-shadow: var(--shadow-pink);
        }

        /* ---------- 4. GRID & CARDS ---------- */
        .grid {
            display: grid;
            grid-template-columns: 1.5fr 0.9fr;
            gap: 24px;
        }

        .glass-card {
            background: rgba(40, 31, 58, 0.8);
            -webkit-backdrop-filter: blur(18px);
            backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 26px;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            will-change: transform;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,138,181,0.4);
            box-shadow: 0 30px 45px rgba(0,0,0,0.7), var(--shadow-pink);
        }

        .card-heading {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--cyber-blue);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }
        .badge-right {
            margin-left: auto;
            font-size: 0.8rem;
            background: rgba(106,212,255,0.15);
            padding: 4px 12px;
            border-radius: var(--radius-pill);
            color: var(--cyber-blue);
            font-weight: 700;
        }

        /* ---------- 5. TASK FORM & INPUTS ---------- */
        .task-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .candy-input, .candy-select {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid transparent;
            border-radius: var(--radius-pill);
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        .candy-input::placeholder { color: rgba(255,255,255,0.5); }
        .candy-input:focus, .candy-select:focus {
            border-color: var(--sakura-pink);
            background: rgba(255,138,181,0.1);
            box-shadow: 0 0 20px rgba(255,138,181,0.3);
        }
        .candy-select {
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }

        .candy-btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-pill);
            background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-glow));
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition-bounce);
            box-shadow: 0 8px 20px rgba(255,138,181,0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        .candy-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .candy-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        .candy-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(255,138,181,0.6);
        }

        /* ---------- 6. FILTERS & TOOLBAR ---------- */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 180px;
        }
        .search-wrap .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }
        .search-wrap .candy-input {
            padding-left: 42px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: var(--transition);
        }
        .filter-btn.active {
            background: var(--sakura-pink);
            border-color: transparent;
            box-shadow: var(--shadow-pink);
        }
        .filter-btn:hover:not(.active) {
            background: rgba(255,138,181,0.2);
            transform: translateY(-2px);
        }

        /* ---------- 7. TASK LIST ---------- */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .task-item {
            background: rgba(255,255,255,0.04);
            padding: 14px 18px;
            border-radius: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--sakura-pink);
            transition: var(--transition);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .task-item:hover {
            background: rgba(255,138,181,0.1);
            transform: translateX(4px);
        }
        .task-item.completed {
            opacity: 0.7;
            border-left-color: #666;
        }
        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }
        .task-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--sakura-pink);
            cursor: pointer;
        }
        .task-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-primary);
        }
        .task-meta {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            margin-top: 3px;
            flex-wrap: wrap;
        }
        .priority-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .priority-badge.High { background: rgba(255,107,107,0.2); color: #ff9f9f; }
        .priority-badge.Medium { background: rgba(255,179,71,0.2); color: #ffd28f; }
        .priority-badge.Low { background: rgba(81,207,102,0.2); color: #a5f0b5; }

        .task-actions {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .icon-btn.edit { background: #3498db; }
        .icon-btn.delete { background: #e74c3c; }
        .icon-btn:hover { transform: scale(1.2); box-shadow: 0 0 15px currentColor; }

        /* ---------- 8. GAMIFICATION ---------- */
        .gamification-row {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        .xp-card {
            background: linear-gradient(145deg, #2f2350, #1e1638);
            border-radius: var(--radius-md);
            padding: 18px;
            border: 1px solid rgba(255,138,181,0.3);
        }
        .level-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .level-badge {
            background: linear-gradient(135deg, var(--sakura-pink), var(--cyber-purple));
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 0 15px #fff;
        }
        .xp-info {
            flex: 1;
        }
        .xp-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
        .xp-bar-bg {
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }
        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sakura-pink), var(--cyber-blue));
            width: 0%;
            transition: width 0.6s ease;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--sakura-pink);
        }
        .badges-mini {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .badge-mini {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,138,181,0.3);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
        }
        .badge-mini.earned {
            background: rgba(255,138,181,0.2);
            color: #fff;
            border-color: var(--sakura-pink);
        }

        /* ---------- 9. CÂY ĐỘNG LỰC ---------- */
        .tree-container {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            padding: 20px 15px;
            text-align: center;
        }
        .tree-svg {
            width: 100%;
            max-height: 120px;
            margin-bottom: 10px;
        }
        .tree-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ---------- 10. PROGRESS RING ---------- */
        .progress-ring-wrap {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            position: relative;
        }
        .progress-ring-wrap svg {
            position: absolute;
            inset: 0;
            transform: rotate(-90deg);
        }
        .progress-ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.08);
            stroke-width: 12;
        }
        .progress-ring-fill {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }
        .progress-ring-label {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 15px var(--sakura-pink);
        }
        .breakdown-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
        }
        .breakdown-item {
            text-align: center;
        }
        .breakdown-val {
            font-size: 1.4rem;
            font-weight: 800;
        }
        .breakdown-val.high { color: var(--color-high); }
        .breakdown-val.med { color: var(--color-med); }
        .breakdown-val.low { color: var(--color-low); }

        /* ---------- 11. MINI POMODORO ---------- */
        .mini-pomo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .pomo-ring-wrap {
            width: 100px;
            height: 100px;
            position: relative;
        }
        .pomo-ring-wrap svg {
            position: absolute;
            inset: 0;
            transform: rotate(-90deg);
        }
        .pomo-bg {
            fill: none;
            stroke: rgba(255,255,255,0.08);
            stroke-width: 8;
        }
        .pomo-fill {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.4s linear;
        }
        .pomo-time {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
        }
        .pomo-btns {
            display: flex;
            gap: 8px;
        }

        /* ---------- 12. CALENDAR & QUICK STATS ---------- */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .cal-nav {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: var(--transition);
        }
        .cal-nav:hover { color: var(--sakura-pink); }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .cal-label {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 4px;
        }
        .calendar-day {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 6px 3px;
            text-align: center;
            font-size: 0.8rem;
            transition: var(--transition);
            cursor: default;
        }
        .calendar-day.today {
            background: var(--sakura-pink);
            color: #000;
            font-weight: 700;
        }
        .calendar-day.has-tasks::after {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            background: var(--cyber-blue);
            border-radius: 50%;
            margin: 2px auto 0;
        }

        .session-card {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            padding: 16px;
        }
        .session-stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .session-stat:last-child { border-bottom: none; }
        .session-stat-val {
            font-weight: 700;
            color: var(--cyber-blue);
        }

        /* ---------- 13. FOOTER ---------- */
        .footer-premium {
            margin-top: 40px;
            padding: 24px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .owner {
            font-weight: 700;
            background: linear-gradient(90deg, var(--sakura-pink), var(--cyber-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ---------- 14. TOAST & MODAL ---------- */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: rgba(40,31,58,0.95);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            color: #fff;
            padding: 12px 28px;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 25px var(--sakura-pink);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(20px) scale(0.9);
            opacity: 0;
            transition: all 0.4s var(--ease-bounce);
        }
        .toast.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(18,14,31,0.9);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-backdrop.open {
            opacity: 1;
            visibility: visible;
        }
        .modal-box {
            background: #281f3a;
            border: 1px solid rgba(255,138,181,0.3);
            border-radius: var(--radius-lg);
            padding: 30px;
            width: min(450px, 90vw);
            transform: scale(0.8);
            transition: transform 0.4s var(--ease-bounce);
        }

<!-- JAVASCRIPT (đã tích hợp gamification) -->
<script>
    // ---------- TOAST ----------
    function showToast(msg, type = 'success', dur = 2800) {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        const icon = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' }[type] || 'fa-check-circle';
        t.innerHTML = `<i class="fas ${icon}" aria-hidden="true"></i> ${msg}`;
        c.appendChild(t);
        requestAnimationFrame(() => t.classList.add('show'));
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, dur);
    }

    // ---------- STATE ----------
    let tasks = [];
    try { tasks = JSON.parse(localStorage.getItem('skr_selflearning')) || []; } catch { tasks = []; }
    let currentFilter = 'all', currentSort = 'date', calWeekOffset = 0;
    let editingId = null;

    // Gamification state
    let xp = parseInt(localStorage.getItem('skr_xp')) || 0;
    let level = parseInt(localStorage.getItem('skr_level')) || 1;
    let badges = JSON.parse(localStorage.getItem('skr_badges')) || [];

    const XP_PER_LEVEL = 100;
    function updateGamification() {
        document.getElementById('levelDisplay').innerText = level;
        const xpCurrent = xp - (level-1)*XP_PER_LEVEL;
        const xpNeeded = XP_PER_LEVEL;
        document.getElementById('xpCurrent').innerText = xpCurrent;
        document.getElementById('xpNext').innerText = xpNeeded;
        const pct = Math.min(100, (xpCurrent / xpNeeded) * 100);
        document.getElementById('xpBarFill').style.width = pct + '%';

        // Badges mẫu
        let badgeHtml = '';
        const badgeList = [
            { name: 'Rookie', earned: true, icon: 'fa-check-circle' },
            { name: '5 tasks', earned: tasks.filter(t => t.completed).length >= 5, icon: 'fa-tasks' },
            { name: '7 day streak', earned: false, icon: 'fa-calendar-check' }
        ];
        badgeList.forEach(b => {
            badgeHtml += `<span class="badge-mini ${b.earned ? 'earned' : ''}" aria-label="Huy hiệu ${b.name}"><i class="fas ${b.icon}" aria-hidden="true"></i> ${b.name}</span>`;
        });
        document.getElementById('badgeList').innerHTML = badgeHtml;

        // Cây động lực
        const totalTasks = tasks.length;
        const doneTasks = tasks.filter(t => t.completed).length;
        const treeProgress = totalTasks ? Math.min(100, Math.floor((doneTasks / totalTasks) * 100)) : 0;
        document.getElementById('treeProgress').innerText = treeProgress + '%';
        const canopy = document.getElementById('treeCanopy');
        if (canopy) {
            const opacity = 0.3 + (treeProgress / 100) * 0.7;
            canopy.setAttribute('fill', 'url(#treeGrad)');
            canopy.setAttribute('opacity', opacity);
            canopy.setAttribute('r', 20 + (treeProgress / 100) * 15);
        }
    }

    function saveTasks() {
        localStorage.setItem('skr_selflearning', JSON.stringify(tasks));
        updateGamification();
    }

    // Helper: tính XP khi hoàn thành task
    function addXP(amount) {
        xp += amount;
        while (xp >= level * XP_PER_LEVEL) {
            level++;
            showToast('🎉 Lên cấp ' + level + '!', 'info', 4000);
            confetti();
        }
        localStorage.setItem('skr_xp', xp);
        localStorage.setItem('skr_level', level);
        updateGamification();
    }

    // Confetti đơn giản
    function confetti() {
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const c = document.createElement('div');
                c.style.position = 'fixed';
                c.style.left = Math.random() * 100 + '%';
                c.style.top = '-10px';
                c.style.width = '8px';
                c.style.height = '8px';
                c.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
                c.style.borderRadius = '50%';
                c.style.zIndex = '9999';
                c.style.animation = `confetti ${2 + Math.random() * 2}s linear forwards`;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 5000);
            }, i * 50);
        }
    }

    // ---------- TASK FUNCTIONS ----------
    const todayStr = () => new Date().toISOString().split('T')[0];

    function getFiltered() {
        const kw = document.getElementById('taskSearch').value.toLowerCase().trim();
        const today = todayStr();
        return tasks.filter(t => {
            if (kw && !t.title.toLowerCase().includes(kw) && !(t.subject || '').toLowerCase().includes(kw) && !(t.tag || '').toLowerCase().includes(kw)) return false;
            switch (currentFilter) {
                case 'active': return !t.completed;
                case 'completed': return t.completed;
                case 'overdue': return !t.completed && t.date && t.date < today;
                case 'today': return t.date === today;
                case 'High': case 'Medium': case 'Low': return t.priority === currentFilter;
                default: return true;
            }
        }).sort((a, b) => {
            if (currentSort === 'priority') {
                const prio = { High: 0, Medium: 1, Low: 2 };
                return (prio[a.priority] || 1) - (prio[b.priority] || 1);
            }
            if (currentSort === 'added') return b.id - a.id;
            if (currentSort === 'alpha') return a.title.localeCompare(b.title);
            return (a.date || '9999') > (b.date || '9999') ? 1 : -1;
        });
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        const filtered = getFiltered();
        const today = todayStr();
        list.innerHTML = '';

        if (!filtered.length) {
            list.innerHTML = '<div class="empty-state text-center" style="padding:30px 0; color:var(--text-muted);">✨ No tasks here. Add one above!</div>';
        } else {
            filtered.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = `task-item${t.completed ? ' completed' : ''}`;
                item.dataset.id = t.id;
                item.dataset.priority = t.priority;
                item.setAttribute('role', 'listitem');
                const overdue = t.date && t.date < today && !t.completed;
                item.innerHTML = `
                    <div class="task-info">
                        <input type="checkbox" class="task-checkbox" ${t.completed ? 'checked' : ''} aria-label="Đánh dấu hoàn thành">
                        <div class="task-text">
                            <div class="task-title">${escapeHtml(t.title)}</div>
                            <div class="task-meta">
                                ${t.date ? `<span class="${overdue ? 'task-overdue' : ''}">${overdue ? '⚠️ ' : '📅 '}${t.date}</span>` : ''}
                                ${t.subject ? `<span>📚 ${escapeHtml(t.subject)}</span>` : ''}
                                ${t.tag ? `<span>🏷️ ${escapeHtml(t.tag)}</span>` : ''}
                                <span class="priority-badge ${t.priority}">${t.priority}</span>
                            </div>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="icon-btn edit" aria-label="Chỉnh sửa task"><i class="fas fa-edit" aria-hidden="true"></i></button>
                        <button class="icon-btn delete" aria-label="Xóa task"><i class="fas fa-trash" aria-hidden="true"></i></button>
                    </div>
                `;
                list.appendChild(item);
            });
        }
        document.getElementById('taskCountBadge').innerText = `${tasks.length} task${tasks.length !== 1 ? 's' : ''}`;
        updateProgressStats();
    }

    function escapeHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function updateProgressStats() {
        const total = tasks.length;
        const done = tasks.filter(t => t.completed).length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        const ring = document.getElementById('ringFill');
        if (ring) {
            const circ = 377;
            ring.style.strokeDashoffset = circ - (pct / 100) * circ;
        }
        document.getElementById('progressPct').innerText = pct + '%';
        document.getElementById('cntHigh').innerText = tasks.filter(t => t.priority === 'High').length;
        document.getElementById('cntMed').innerText = tasks.filter(t => t.priority === 'Medium').length;
        document.getElementById('cntLow').innerText = tasks.filter(t => t.priority === 'Low').length;

        // Quick stats
        document.getElementById('qsTotal').innerText = total;
        document.getElementById('qsToday').innerText = tasks.filter(t => t.completed && t.completedAt === todayStr()).length;
        document.getElementById('qsOverdue').innerText = tasks.filter(t => !t.completed && t.date && t.date < todayStr()).length;
        const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate() + 7);
        const weekStr = weekEnd.toISOString().split('T')[0];
        document.getElementById('qsWeek').innerText = tasks.filter(t => t.date && t.date >= todayStr() && t.date <= weekStr).length;
        document.getElementById('qsRate').innerText = total ? Math.round((done / total) * 100) + '%' : '0%';

        updateGamification();
    }

    function addTask() {
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) { showToast('Nhập tiêu đề task', 'warning'); return; }
        tasks.push({
            id: Date.now(),
            title,
            date: document.getElementById('taskDate').value || '',
            subject: document.getElementById('taskSubject').value.trim(),
            tag: document.getElementById('taskTag').value.trim(),
            priority: document.getElementById('taskPriority').value,
            completed: false,
            completedAt: null,
        });
        saveTasks();
        renderTasks();
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskSubject').value = '';
        document.getElementById('taskTag').value = '';
        showToast('Đã thêm task ✨');
    }

    // ---------- EVENT DELEGATION ----------
    document.getElementById('taskList').addEventListener('click', (e) => {
        const item = e.target.closest('.task-item');
        if (!item) return;
        const id = +item.dataset.id;
        if (e.target.closest('.delete')) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            showToast('Đã xóa', 'warning');
        } else if (e.target.closest('.edit')) {
            const t = tasks.find(t => t.id === id);
            if (!t) return;
            editingId = id;
            document.getElementById('editTitle').value = t.title;
            document.getElementById('editDate').value = t.date || '';
            document.getElementById('editSubject').value = t.subject || '';
            document.getElementById('editPriority').value = t.priority;
            document.getElementById('editTag').value = t.tag || '';
            document.getElementById('editModal').classList.add('open');
        }
    });

    document.getElementById('taskList').addEventListener('change', (e) => {
        if (!e.target.matches('.task-checkbox')) return;
        const item = e.target.closest('.task-item');
        if (!item) return;
        const id = +item.dataset.id;
        const t = tasks.find(t => t.id === id);
        if (!t) return;
        const wasCompleted = t.completed;
        t.completed = e.target.checked;
        t.completedAt = e.target.checked ? todayStr() : null;
        saveTasks();
        renderTasks();
        if (!wasCompleted && t.completed) {
            addXP(10); // +10 XP khi hoàn thành task
            showToast('✅ +10 XP', 'success');
            // Confetti nhẹ
            if (Math.random() > 0.7) confetti();
        }
    });

    // FILTERS
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderTasks();
        });
    });

    document.getElementById('clearDoneBtn').addEventListener('click', () => {
        tasks = tasks.filter(t => !t.completed);
        saveTasks();
        renderTasks();
        showToast('Đã xóa tasks đã hoàn thành', 'info');
    });

    document.getElementById('sortSelect').addEventListener('change', (e) => { currentSort = e.target.value; renderTasks(); });
    document.getElementById('taskSearch').addEventListener('input', renderTasks);
    document.getElementById('taskForm').addEventListener('submit', (e) => { e.preventDefault(); addTask(); });
    document.getElementById('addBtn').addEventListener('click', addTask);
    document.getElementById('exportBtn').addEventListener('click', () => {
        if (!tasks.length) { showToast('Không có task nào', 'warning'); return; }
        const lines = tasks.map(t => `[${t.completed ? 'x' : ' '}] ${t.title} | ${t.date || 'no date'} | ${t.priority}`);
        const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'skr-tasks.txt';
        a.click();
        showToast('Đã export');
    });

    document.getElementById('importFromFlashBtn').addEventListener('click', () => {
        try {
            const cards = JSON.parse(localStorage.getItem('flashcards')) || [];
            if (!cards.length) { showToast('Không có flashcard nào', 'warning'); return; }
            let added = 0;
            cards.forEach(c => {
                if (!tasks.some(t => t.title === c.front)) {
                    tasks.push({
                        id: Date.now() + Math.random(),
                        title: `Review: ${c.front}`,
                        date: '',
                        subject: 'Flashcard',
                        tag: 'flashcard',
                        priority: 'Low',
                        completed: false,
                        completedAt: null,
                    });
                    added++;
                }
            });
            saveTasks();
            renderTasks();
            showToast(`Đã import ${added} flashcard`, 'success');
        } catch { showToast('Lỗi import', 'error'); }
    });

    // MODAL EDIT
    document.getElementById('saveEditBtn').addEventListener('click', () => {
        if (!editingId) return;
        const t = tasks.find(t => t.id === editingId);
        if (!t) return;
        const newTitle = document.getElementById('editTitle').value.trim();
        if (!newTitle) { showToast('Tiêu đề không được để trống', 'warning'); return; }
        t.title = newTitle;
        t.date = document.getElementById('editDate').value;
        t.subject = document.getElementById('editSubject').value.trim();
        t.priority = document.getElementById('editPriority').value;
        t.tag = document.getElementById('editTag').value.trim();
        saveTasks();
        renderTasks();
        closeModal();
        showToast('Đã cập nhật', 'info');
    });

    function closeModal() {
        document.getElementById('editModal').classList.remove('open');
        editingId = null;
    }
    document.getElementById('cancelEditBtn').addEventListener('click', closeModal);
    // Thêm nút close nếu có
    const modalClose = document.querySelector('.modal-close');
    if (modalClose) modalClose.addEventListener('click', closeModal);
    document.getElementById('editModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

    // CALENDAR
    function renderCalendar() {
        const cal = document.getElementById('calendar');
        if (!cal) return;
        const today = new Date();
        const base = new Date(today);
        base.setDate(today.getDate() - ((today.getDay() + 6) % 7) + calWeekOffset * 7);
        const days = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
        let html = days.map(d => `<div class="cal-label">${d}</div>`).join('');
        for (let i = 0; i < 7; i++) {
            const day = new Date(base);
            day.setDate(base.getDate() + i);
            const ds = day.toISOString().split('T')[0];
            const count = tasks.filter(t => t.date === ds).length;
            const cls = `calendar-day ${ds === todayStr() ? 'today' : ''} ${count > 0 ? 'has-tasks' : ''}`;
            html += `<div class="${cls}" role="gridcell"><span class="day-num">${day.getDate()}</span></div>`;
        }
        cal.innerHTML = html;
        const end = new Date(base); end.setDate(base.getDate() + 6);
        document.getElementById('calTitle').innerText = `${base.getDate()}/${base.getMonth()+1} – ${end.getDate()}/${end.getMonth()+1}/${end.getFullYear()}`;
    }

    document.getElementById('calPrev').addEventListener('click', () => { calWeekOffset--; renderCalendar(); });
    document.getElementById('calNext').addEventListener('click', () => { calWeekOffset++; renderCalendar(); });

    // POMODORO (mini)
    const POMO_PHASES = [
        { label: 'FOCUS', mins: 25 },
        { label: 'BREAK', mins: 5 },
        { label: 'FOCUS', mins: 25 },
        { label: 'BREAK', mins: 5 },
        { label: 'FOCUS', mins: 25 },
        { label: 'BREAK', mins: 5 },
        { label: 'FOCUS', mins: 25 },
        { label: 'LONG', mins: 15 },
    ];
    let pomoPhase = 0, pomoRunning = false, pomoEndTime = null, pomoElapsed = 0, pomoTimer = null;
    const POMO_CIRC = 239;

    function updatePomoDisplay() {
        const phase = POMO_PHASES[pomoPhase];
        const totalMs = phase.mins * 60 * 1000;
        let remaining;
        if (pomoRunning && pomoEndTime) remaining = Math.max(0, pomoEndTime - Date.now());
        else remaining = totalMs - pomoElapsed;
        const secs = Math.ceil(remaining / 1000);
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        document.getElementById('pomoDisplay').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        const offset = POMO_CIRC - (1 - remaining / totalMs) * POMO_CIRC;
        document.getElementById('pomoRing').style.strokeDashoffset = Math.max(0, offset);
    }

    function pomoDone() {
        clearInterval(pomoTimer); pomoRunning = false; pomoEndTime = null; pomoElapsed = 0;
        pomoPhase = (pomoPhase + 1) % POMO_PHASES.length;
        showToast(POMO_PHASES[(pomoPhase - 1 + POMO_PHASES.length) % POMO_PHASES.length].label === 'FOCUS' ? '🍅 Focus done! Nghỉ ngơi thôi' : '⏰ Break xong, focus tiếp!', 'info');
        document.getElementById('pomoStart').innerHTML = '<i class="fas fa-play" aria-hidden="true"></i>';
        updatePomoDisplay();
    }

    document.getElementById('pomoStart').addEventListener('click', () => {
        if (pomoRunning) {
            clearInterval(pomoTimer);
            pomoElapsed += Date.now() - pomoEndTime + POMO_PHASES[pomoPhase].mins * 60 * 1000;
            pomoRunning = false; pomoEndTime = null;
            document.getElementById('pomoStart').innerHTML = '<i class="fas fa-play" aria-hidden="true"></i>';
        } else {
            const totalMs = POMO_PHASES[pomoPhase].mins * 60 * 1000;
            pomoEndTime = Date.now() + (totalMs - pomoElapsed);
            pomoRunning = true;
            document.getElementById('pomoStart').innerHTML = '<i class="fas fa-pause" aria-hidden="true"></i>';
            pomoTimer = setInterval(() => {
                if (Date.now() >= pomoEndTime) pomoDone();
                else updatePomoDisplay();
            }, 500);
        }
        updatePomoDisplay();
    });

    document.getElementById('pomoSkip').addEventListener('click', () => {
        clearInterval(pomoTimer); pomoRunning = false; pomoEndTime = null; pomoElapsed = 0;
        pomoPhase = (pomoPhase + 1) % POMO_PHASES.length;
        document.getElementById('pomoStart').innerHTML = '<i class="fas fa-play" aria-hidden="true"></i>';
        updatePomoDisplay();
    });

    document.getElementById('pomoReset').addEventListener('click', () => {
        clearInterval(pomoTimer); pomoRunning = false; pomoEndTime = null; pomoElapsed = 0;
        document.getElementById('pomoStart').innerHTML = '<i class="fas fa-play" aria-hidden="true"></i>';
        updatePomoDisplay();
    });

    // INIT
    (function init() {
        document.getElementById('taskDate').value = todayStr();
        renderTasks();
        renderCalendar();
        updateGamification();
        setInterval(() => { if (pomoRunning) updatePomoDisplay(); }, 500);
    })();
</script>
</body>
</html>
